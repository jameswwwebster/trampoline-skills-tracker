<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <!-- Primary Meta Tags -->
    <meta name="description" content="Trampoline and DMT club based in Newcastle. We offer sessions for all ages and abilities, with competitive pathways from club level to international." />
    <meta name="author" content="Trampoline Life" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://trampoline.life" />

    <!-- Sitemap -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
    
    <!-- Favicon (default: Trampoline Life; overridden per section by React) -->
    <link id="favicon" rel="icon" type="image/png" href="/favicon-root.png" />
    <link rel="apple-touch-icon" href="/favicon-root.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://trampoline.life" />
    <meta property="og:title" content="Trampoline Life | Newcastle | Trampoline &amp; DMT Club" />
    <meta property="og:description" content="Trampoline and DMT club based in Newcastle. We offer sessions for all ages and abilities, with competitive pathways from club level to international." />
    <meta property="og:image" content="https://trampoline.life/social-preview-root.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Trampoline Life" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://trampoline.life" />
    <meta name="twitter:title" content="Trampoline Life | Newcastle | Trampoline &amp; DMT Club" />
    <meta name="twitter:description" content="Trampoline and DMT club based in Newcastle. We offer sessions for all ages and abilities, with competitive pathways from club level to international." />
    <meta name="twitter:image" content="https://trampoline.life/social-preview-root.png" />
    
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SportsOrganization",
      "name": "Trampoline Life",
      "description": "Trampoline and DMT club based in Newcastle. We offer sessions for all ages and abilities, with competitive pathways from club level to international.",
      "url": "https://trampoline.life",
      "sport": "Trampoline Gymnastics",
      "inLanguage": "en-GB"
    }
    </script>
    
    <title>Trampoline Life</title>
    <style>
      * {
        box-sizing: border-box;
      }
      
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f5f5f5;
      }
      
      code {
        font-family: source-code-pro, Menlo, Monaco, Consolas, 'Courier New',
          monospace;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
